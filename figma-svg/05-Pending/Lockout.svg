  <!-- User Card — Pending badge (amber) -->
  <line x1="0" y1="850" x2="256" y2="850" stroke="#fff" stroke-opacity="0.08"/>
  <circle cx="32" cy="874" r="16" fill="#ffd100"/>
  <text x="32" y="879" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#242527" text-anchor="middle">ว</text>
  <text x="56" y="868" font-family="Inter, Noto Sans Thai, sans-serif" font-size="12" font-weight="500" fill="#fff">วิภาวี รักษ์ดี</text>
  <rect x="148" y="858" width="60" height="18" rx="9" fill="#fffbeb"/>
