    <rect x="256" y="64" width="1184" height="836" fill="#f6f6f7"/>

    <!-- Centered lockout card -->
    <rect x="548" y="240" width="600" height="340" rx="24" fill="#fff" stroke="#e8e8ea" stroke-width="1"/>

    <!-- Lock icon circle -->
    <circle cx="848" cy="310" r="40" fill="#fffbeb"/>
    <text x="848" y="322" font-family="Inter, sans-serif" font-size="36" text-anchor="middle">🔒</text>

