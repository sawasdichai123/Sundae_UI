    <!-- Description -->
    <text x="848" y="412" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#6a6b6e" text-anchor="middle">บัญชีของคุณอยู่ระหว่างรอการอนุมัติจากเจ้าหน้าที่</text>
