  <text x="52" y="237" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#a9aaad">Bots</text>
  <text x="52" y="277" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#a9aaad">Inbox</text>
