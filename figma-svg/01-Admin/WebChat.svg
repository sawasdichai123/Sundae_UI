  <text x="52" y="397" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#a9aaad">Approvals</text>
  <rect x="12" y="412" width="232" height="40" rx="12" fill="rgba(255,209,0,0.2)"/>
  <text x="52" y="437" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#ffd100">Web Chat</text>
  <text x="52" y="477" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#a9aaad">Profile</text>

  <line x1="0" y1="850" x2="256" y2="850" stroke="#fff" stroke-opacity="0.08"/>
  <circle cx="32" cy="874" r="16" fill="#ffd100"/>
  <text x="32" y="879" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#242527" text-anchor="middle">ณ</text>
  <text x="56" y="868" font-family="Inter, Noto Sans Thai, sans-serif" font-size="12" font-weight="500" fill="#fff">ณัฐพล วงศ์สุวรรณ</text>
  <rect x="166" y="858" width="42" height="18" rx="9" fill="#ffd100"/>
  <text x="187" y="871" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#242527" text-anchor="middle">Admin</text>
  <text x="56" y="884" font-family="Inter, sans-serif" font-size="10" fill="#7e7f82">admin@sundae.local</text>

  <!-- ============ HEADER ============ -->
