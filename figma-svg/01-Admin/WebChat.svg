  <text x="24" y="101" font-family="Inter, Noto Sans Thai, sans-serif" font-size="12" font-weight="500" fill="#d1d1d4">NT Corporation</text>

  <text x="52" y="157" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#a9aaad">Dashboard</text>
