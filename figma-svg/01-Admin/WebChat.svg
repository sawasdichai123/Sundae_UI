  <text x="1366" y="41" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#047857">Online</text>

  <!-- ============ MAIN CONTENT ============ -->
  <g clip-path="url(#mainClip)">
    <rect x="256" y="64" width="1184" height="836" fill="#f6f6f7"/>

    <!-- Chat Layout: History sidebar (left 280px) + Chat area (right) -->

    <!-- ====== LEFT: Chat History Sidebar ====== -->
    <rect x="256" y="64" width="280" height="836" fill="#fff"/>
    <line x1="536" y1="64" x2="536" y2="900" stroke="#e8e8ea"/>

    <!-- Bot selector dropdown -->
    <rect x="272" y="80" width="248" height="36" rx="10" fill="#f6f6f7" stroke="#d1d1d4" stroke-width="1"/>
    <text x="288" y="103" font-family="Inter, sans-serif" font-size="13" fill="#333436">HR Assistant</text>
    <text x="504" y="103" font-family="Inter, sans-serif" font-size="12" fill="#7e7f82">▾</text>

    <!-- New Chat button -->
    <rect x="272" y="126" width="248" height="36" rx="10" fill="#ffd100"/>
    <text x="396" y="149" font-family="Inter, Noto Sans Thai, sans-serif" font-size="13" font-weight="700" fill="#242527" text-anchor="middle">+ สนทนาใหม่</text>

    <!-- Session history -->
    <text x="280" y="186" font-family="Inter, Noto Sans Thai, sans-serif" font-size="11" font-weight="600" fill="#7e7f82">ประวัติการสนทนา</text>

    <!-- Session 1 (active/current) -->
    <rect x="272" y="196" width="248" height="56" rx="10" fill="#fffdf0"/>
    <text x="284" y="216" font-family="Inter, Noto Sans Thai, sans-serif" font-size="12" font-weight="500" fill="#242527">สิทธิลาพักร้อน...</text>
    <rect x="284" y="224" width="48" height="16" rx="8" fill="#ecfdf5"/>
    <text x="308" y="235" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#059669" text-anchor="middle">Active</text>
    <text x="340" y="235" font-family="Inter, sans-serif" font-size="9" fill="#7e7f82">10:30</text>

    <!-- Session 2 (helped) -->
    <rect x="272" y="260" width="248" height="56" rx="10" fill="transparent"/>
    <text x="284" y="280" font-family="Inter, Noto Sans Thai, sans-serif" font-size="12" font-weight="500" fill="#242527">เรื่องเบิกค่ารักษา...</text>
    <rect x="284" y="288" width="84" height="16" rx="8" fill="#eff6ff"/>
    <text x="326" y="299" font-family="Inter, Noto Sans Thai, sans-serif" font-size="9" font-weight="500" fill="#2563eb" text-anchor="middle">ช่วยเหลือเรียบร้อย</text>
    <text x="376" y="299" font-family="Inter, sans-serif" font-size="9" fill="#7e7f82">เมื่อวาน</text>

    <!-- ====== RIGHT: Chat Area ====== -->
    <!-- Chat header -->
    <rect x="536" y="64" width="904" height="56" fill="#fff"/>
    <line x1="536" y1="120" x2="1440" y2="120" stroke="#e8e8ea"/>
    <text x="560" y="92" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#242527">HR Assistant</text>
    <text x="560" y="110" font-family="Inter, sans-serif" font-size="12" fill="#6a6b6e">AI-powered HR knowledge assistant</text>

    <!-- Human takeover button -->
    <rect x="1240" y="78" width="172" height="32" rx="16" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="1326" y="99" font-family="Inter, Noto Sans Thai, sans-serif" font-size="12" font-weight="600" fill="#b45309" text-anchor="middle">🙋 ส่งต่อเจ้าหน้าที่</text>

    <!-- Chat messages area -->
    <rect x="536" y="120" width="904" height="660" fill="#f6f6f7"/>

    <!-- Welcome message (bot) -->
    <rect x="560" y="148" width="420" height="60" rx="16" fill="#fff"/>
    <text x="576" y="172" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#333436">สวัสดีค่ะ! ฉันเป็น HR Assistant</text>
    <text x="576" y="192" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#333436">พร้อมตอบคำถามด้าน HR ได้เลยค่ะ</text>

    <!-- User message -->
    <rect x="920" y="228" width="380" height="40" rx="16" fill="#ffd100"/>
    <text x="936" y="253" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#242527">สอบถามเรื่องสิทธิลาพักร้อนครับ</text>

    <!-- Bot response -->
    <rect x="560" y="288" width="500" height="100" rx="16" fill="#fff"/>
    <text x="576" y="312" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#333436">สิทธิลาพักร้อนประจำปี:</text>
    <text x="576" y="332" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#333436">• พนักงานทำงานครบ 1 ปี: 6 วัน</text>
    <text x="576" y="352" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#333436">• ครบ 3 ปี: 10 วัน</text>
    <text x="576" y="372" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#333436">• ครบ 5 ปี: 15 วัน</text>

    <!-- Chat input area -->
    <rect x="536" y="780" width="904" height="120" fill="#fff"/>
    <line x1="536" y1="780" x2="1440" y2="780" stroke="#e8e8ea"/>
    <rect x="560" y="800" width="780" height="72" rx="16" fill="#f6f6f7" stroke="#d1d1d4" stroke-width="1"/>
    <text x="580" y="840" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#a9aaad">พิมพ์ข้อความ...</text>
    <rect x="1354" y="808" width="60" height="56" rx="12" fill="#ffd100"/>
    <text x="1384" y="842" font-family="Inter, sans-serif" font-size="20" fill="#242527" text-anchor="middle">↑</text>
