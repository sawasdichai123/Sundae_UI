<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#242527"/>
      <stop offset="50%" stop-color="#333436"/>
      <stop offset="100%" stop-color="#434547"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#bgGrad)"/>
  <circle cx="1080" cy="225" r="192" fill="#ffd100" fill-opacity="0.08" filter="url(#blur1)"/>
  <circle cx="360" cy="675" r="192" fill="#6a6b6e" fill-opacity="0.1" filter="url(#blur1)"/>

  <!-- Card -->
  <rect x="536" y="150" width="368" height="520" rx="24" fill="#fff" filter="url(#cardShadow)"/>

  <!-- Brand Header -->
  <rect x="568" y="182" width="40" height="40" rx="12" fill="#ffd100"/>
  <text x="588" y="209" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#242527" text-anchor="middle">S</text>
  <text x="620" y="198" font-family="Inter, Noto Sans Thai, sans-serif" font-size="18" font-weight="700" fill="#242527">ตั้งรหัสผ่านใหม่</text>
  <text x="620" y="215" font-family="Inter, sans-serif" font-size="12" fill="#7e7f82">SUNDAE Admin Dashboard</text>

  <!-- Description -->
  <text x="568" y="252" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#6a6b6e">กรอกรหัสผ่านใหม่ที่ต้องการใช้งาน</text>
  <text x="568" y="270" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#6a6b6e">(อย่างน้อย 6 ตัวอักษร)</text>

  <!-- New Password Label -->
  <text x="568" y="306" font-family="Inter, Noto Sans Thai, sans-serif" font-size="12" font-weight="500" fill="#545659">รหัสผ่านใหม่</text>
  <rect x="568" y="314" width="304" height="42" rx="12" fill="#f6f6f7" stroke="#d1d1d4" stroke-width="1"/>
  <text x="584" y="340" font-family="Inter, sans-serif" font-size="14" fill="#a9aaad">อย่างน้อย 6 ตัวอักษร</text>

  <!-- Confirm Password Label -->
  <text x="568" y="382" font-family="Inter, Noto Sans Thai, sans-serif" font-size="12" font-weight="500" fill="#545659">ยืนยันรหัสผ่านใหม่</text>
  <rect x="568" y="390" width="304" height="42" rx="12" fill="#f6f6f7" stroke="#d1d1d4" stroke-width="1"/>
  <text x="584" y="416" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#a9aaad">กรอกรหัสผ่านอีกครั้ง</text>

  <!-- Submit Button -->
  <rect x="568" y="456" width="304" height="48" rx="12" fill="#ffd100"/>
  <text x="720" y="486" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" font-weight="700" fill="#242527" text-anchor="middle">ตั้งรหัสผ่านใหม่</text>

  <!-- Footer -->
  <text x="720" y="560" font-family="Inter, sans-serif" font-size="10" fill="#7e7f82" text-anchor="middle">© 2026 SUNDAE · Powered by Supabase Auth</text>

  <text x="720" y="700" font-family="Inter, sans-serif" font-size="11" fill="#7e7f82" text-anchor="middle">© 2026 SUNDAE · Enterprise AI Platform</text>
</svg>
