<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#242527"/>
      <stop offset="50%" stop-color="#333436"/>
      <stop offset="100%" stop-color="#434547"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#bgGrad)"/>
  <circle cx="1080" cy="225" r="192" fill="#ffd100" fill-opacity="0.08" filter="url(#blur1)"/>
  <circle cx="360" cy="675" r="192" fill="#6a6b6e" fill-opacity="0.1" filter="url(#blur1)"/>

  <!-- Card -->
  <rect x="536" y="200" width="368" height="380" rx="24" fill="#fff" filter="url(#cardShadow)"/>

  <!-- Brand Header -->
  <rect x="568" y="232" width="40" height="40" rx="12" fill="#ffd100"/>
  <text x="588" y="259" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#242527" text-anchor="middle">S</text>
  <text x="620" y="248" font-family="Inter, Noto Sans Thai, sans-serif" font-size="18" font-weight="700" fill="#242527">ลืมรหัสผ่าน</text>
  <text x="620" y="265" font-family="Inter, sans-serif" font-size="12" fill="#7e7f82">SUNDAE Admin Dashboard</text>

  <!-- Success Box -->
  <rect x="568" y="292" width="304" height="72" rx="12" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="584" y="316" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" font-weight="500" fill="#047857">ส่งลิงก์รีเซ็ตรหัสผ่านแล้ว</text>
  <text x="584" y="336" font-family="Inter, Noto Sans Thai, sans-serif" font-size="12" fill="#059669">กรุณาตรวจสอบอีเมล</text>
  <text x="584" y="352" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#059669">user@example.com</text>

  <!-- Back to Login Button -->
  <rect x="568" y="384" width="304" height="48" rx="12" fill="#333436"/>
  <text x="720" y="414" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">กลับไปหน้าเข้าสู่ระบบ</text>

  <!-- Footer -->
  <text x="720" y="480" font-family="Inter, sans-serif" font-size="10" fill="#7e7f82" text-anchor="middle">© 2026 SUNDAE · Powered by Supabase Auth</text>

  <text x="720" y="610" font-family="Inter, sans-serif" font-size="11" fill="#7e7f82" text-anchor="middle">© 2026 SUNDAE · Enterprise AI Platform</text>
</svg>
