<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#242527"/>
      <stop offset="50%" stop-color="#333436"/>
      <stop offset="100%" stop-color="#434547"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#bgGrad)"/>
  <circle cx="1080" cy="225" r="192" fill="#ffd100" fill-opacity="0.08" filter="url(#blur1)"/>
  <circle cx="360" cy="675" r="192" fill="#6a6b6e" fill-opacity="0.1" filter="url(#blur1)"/>

  <!-- Card -->
  <rect x="536" y="180" width="368" height="440" rx="24" fill="#fff" filter="url(#cardShadow)"/>

  <!-- Brand Header -->
  <rect x="568" y="212" width="40" height="40" rx="12" fill="#ffd100"/>
  <text x="588" y="239" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#242527" text-anchor="middle">S</text>
  <text x="620" y="228" font-family="Inter, Noto Sans Thai, sans-serif" font-size="18" font-weight="700" fill="#242527">ลืมรหัสผ่าน</text>
  <text x="620" y="245" font-family="Inter, sans-serif" font-size="12" fill="#7e7f82">SUNDAE Admin Dashboard</text>

  <!-- Description -->
  <text x="568" y="282" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#6a6b6e">กรอกอีเมลที่ใช้สมัครสมาชิก</text>
  <text x="568" y="300" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#6a6b6e">ระบบจะส่งลิงก์สำหรับตั้งรหัสผ่านใหม่ไปให้</text>

  <!-- Email Label -->
  <text x="568" y="336" font-family="Inter, Noto Sans Thai, sans-serif" font-size="12" font-weight="500" fill="#545659">อีเมล</text>
  <!-- Email Input -->
  <rect x="568" y="344" width="304" height="42" rx="12" fill="#f6f6f7" stroke="#d1d1d4" stroke-width="1"/>
  <text x="584" y="370" font-family="Inter, sans-serif" font-size="14" fill="#a9aaad">name@company.com</text>

  <!-- Submit Button -->
  <rect x="568" y="406" width="304" height="48" rx="12" fill="#ffd100"/>
  <text x="720" y="436" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" font-weight="700" fill="#242527" text-anchor="middle">ส่งลิงก์รีเซ็ตรหัสผ่าน</text>

  <!-- Back to login link -->
  <text x="720" y="480" font-family="Inter, Noto Sans Thai, sans-serif" font-size="14" fill="#7e7f82" text-anchor="middle">กลับไปหน้าเข้าสู่ระบบ</text>

  <!-- Footer -->
  <text x="720" y="530" font-family="Inter, sans-serif" font-size="10" fill="#7e7f82" text-anchor="middle">© 2026 SUNDAE · Powered by Supabase Auth</text>

  <text x="720" y="650" font-family="Inter, sans-serif" font-size="11" fill="#7e7f82" text-anchor="middle">© 2026 SUNDAE · Enterprise AI Platform</text>
</svg>
