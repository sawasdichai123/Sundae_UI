# ═══════════════════════════════════════════════════════════════════
# SUNDAE — Docker Compose (Frontend + Backend + Ollama)
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop all services
#
# First-time setup (pull the LLM model):
#   docker compose exec ollama ollama pull qwen3:14b
#
# NOTE: Supabase is NOT included here — connect externally via .env
# ═══════════════════════════════════════════════════════════════════

services:
  # ── React Frontend (Nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Backend URL — points to the Docker backend service (host-mapped port)
        VITE_API_BASE_URL: http://localhost:8001
        # Supabase — set these in your shell or .env before building
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    container_name: sundae-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sundae-network

  # ── FastAPI Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sundae-backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override Ollama URL to point to the Docker service name
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - sundae-network

  # ── Ollama AI Engine ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sundae-ollama
    ports:
      - "11434:11434"
    volumes:
      # Persist downloaded models across container restarts
      - ./ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    restart: unless-stopped
    networks:
      - sundae-network

networks:
  sundae-network:
    driver: bridge
