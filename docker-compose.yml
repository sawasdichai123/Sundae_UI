# ═══════════════════════════════════════════════════════════════════
# SUNDAE — Docker Compose (Backend + Ollama)
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop all services
#
# First-time setup (pull the LLM model):
#   docker compose exec ollama ollama pull qwen3:14b
#
# NOTE: Supabase is NOT included here — connect externally via .env
# ═══════════════════════════════════════════════════════════════════

services:
  # ── FastAPI Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sundae-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override Ollama URL to point to the Docker service name
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - sundae-network

  # ── Ollama AI Engine ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sundae-ollama
    ports:
      - "11434:11434"
    volumes:
      # Persist downloaded models across container restarts
      - ./ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    restart: unless-stopped
    networks:
      - sundae-network

networks:
  sundae-network:
    driver: bridge
